<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A Radarr and Sonarr companion app for managing torrents" />
    <meta name="theme-color" content="#2563eb" />
    <link rel="manifest" href="manifest.json" crossorigin="use-credentials" />
    <title>qBitrr</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register service worker for PWA support.
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', async () => {
          try {
            const staticMatch = window.location.pathname.match(/^(.*)\/static\/index\.html$/);
            const basePrefix = staticMatch ? staticMatch[1] : '';
            const swPath = `${basePrefix}/sw.js` || '/sw.js';
            const swScope = basePrefix ? `${basePrefix}/` : '/';

            // Check if service worker file is accessible.
            const swResponse = await fetch(swPath, { method: 'HEAD', credentials: 'same-origin' });
            if (!swResponse.ok || swResponse.status === 401 || swResponse.status === 403) {
              console.debug('ServiceWorker not available for current auth/proxy configuration');
              return;
            }

            // Attempt registration
            await navigator.serviceWorker.register(swPath, { scope: swScope });
            console.log('ServiceWorker registered successfully');
          } catch (error) {
            // Silently fail on insecure contexts or other errors
            if (error.name === 'SecurityError' || error.name === 'TypeError') {
              console.debug('ServiceWorker not available (requires HTTPS or localhost)');
            } else {
              console.debug('ServiceWorker registration failed:', error.message);
            }
          }
        });
      }
    </script>
  </body>
</html>
