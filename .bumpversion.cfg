[bumpversion]
current_version = 5.11.0
tag = false
parse = (?P<major>\d+)\.(?P<minor>\d+)\.(?P<patch>\d+)
serialize = 
	{major}.{minor}.{patch}

[bumpversion:part:build]

[bumpversion:file:setup.cfg]

[bumpversion:file:qBitrr/bundled_data.py]

[bumpversion:file:Dockerfile]

[bumpversion:file:qBitrr/gen_config.py]

[bumpversion:file:docs/index.md]
search = **Latest Release**: v{current_version}
replace = **Latest Release**: v{new_version}

[bumpversion:file:qBitrr/config_version.py]
search = EXPECTED_CONFIG_VERSION = "{current_version}"
replace = EXPECTED_CONFIG_VERSION = "{new_version}"

[bumpversion:file:docs/configuration/config-file.md]
search = ConfigVersion = "{current_version}"
replace = ConfigVersion = "{new_version}"
